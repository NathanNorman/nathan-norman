<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B2B Invoice Intelligence — Pitch Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d5c63;
      font-family: 'DM Sans', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Password gate ── */
    #gate {
      position: fixed;
      inset: 0;
      background: #0d5c63;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #gate.hidden { display: none; }

    .gate-box {
      background: #fffffa;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 360px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
    }
    .gate-box h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #0d5c63;
      margin-bottom: 0.35rem;
      letter-spacing: -0.01em;
    }
    .gate-box p {
      font-size: 0.85rem;
      color: #44a1a0;
      margin-bottom: 2rem;
    }
    .gate-box input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #78cdd7;
      border-radius: 8px;
      font-size: 1rem;
      color: #0d5c63;
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
      background: #fffffa;
      transition: border-color 0.2s;
    }
    .gate-box input:focus { border-color: #44a1a0; }
    .gate-box input.error { border-color: #e05c5c; animation: shake 0.3s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .gate-box button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem;
      background: #0d5c63;
      color: #fffffa;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .gate-box button:hover { background: #247b7b; }
    .gate-hint {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #e05c5c;
      min-height: 1rem;
    }

    /* ── Deck ── */
    #deck {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .slide {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: #0d5c63;
    }
    .slide.active { display: flex; }

    .slide img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ── Nav ── */
    .nav {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.75rem;
      align-items: center;
      z-index: 10;
      background: rgba(13, 92, 99, 0.75);
      backdrop-filter: blur(8px);
      padding: 0.5rem 1rem;
      border-radius: 100px;
      border: 1px solid rgba(255,255,250,0.15);
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    .nav.hidden { opacity: 0; pointer-events: none; }
    .nav button {
      background: rgba(255,255,250,0.12);
      border: 1px solid rgba(255,255,250,0.2);
      color: #fffffa;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav button:hover { background: rgba(255,255,250,0.22); }
    .nav button:disabled { opacity: 0.3; cursor: default; }
    .nav .counter {
      color: rgba(255,255,250,0.7);
      font-size: 0.8rem;
      min-width: 3.5rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Password Gate -->
  <div id="gate">
    <div class="gate-box">
      <h1>B2B Invoice Intelligence</h1>
      <p>This presentation is password protected.</p>
      <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off">
      <div class="gate-hint" id="pw-hint"></div>
      <button id="pw-submit">Enter</button>
    </div>
  </div>

  <!-- Deck -->
  <div id="deck">
    <div class="slide active"><img src="slide1.png" alt="Slide 1"></div>
    <div class="slide"><img src="slide2.png" alt="Slide 2"></div>
    <div class="slide"><img src="slide3.png" alt="Slide 3"></div>
    <div class="slide"><img src="slide4.png" alt="Slide 4"></div>
    <div class="slide"><img src="slide5.png" alt="Slide 5"></div>
    <div class="slide"><img src="slide6.png" alt="Slide 6"></div>
    <div class="slide"><img src="slide7.png" alt="Slide 7"></div>
    <div class="slide"><img src="slide8.png" alt="Slide 8"></div>
    <div class="slide"><img src="slide9.png" alt="Slide 9"></div>
    <div class="slide"><img src="slide10.png" alt="Slide 10"></div>
    <div class="slide"><img src="slide11.png" alt="Slide 11"></div>
    <div class="slide"><img src="slide12.png" alt="Slide 12"></div>
    <div class="slide"><img src="slide13.png" alt="Slide 13"></div>
    <div class="slide"><img src="slide14.png" alt="Slide 14"></div>
  </div>

  <!-- Nav -->
  <div class="nav">
    <button id="prev" disabled>← Prev</button>
    <span class="counter" id="counter">1 / 14</span>
    <button id="next">Next →</button>
  </div>

  <script>
    const PASS = 'tcPUAJhv3xNkQorGtFiZSm3P';
    const gate = document.getElementById('gate');
    const input = document.getElementById('pw-input');
    const hint = document.getElementById('pw-hint');

    function unlock() {
      if (input.value === PASS) {
        sessionStorage.setItem('pitch-unlocked', '1');
        gate.classList.add('hidden');
      } else {
        input.classList.add('error');
        hint.textContent = 'Incorrect password.';
        input.value = '';
        setTimeout(() => input.classList.remove('error'), 400);
      }
    }

    if (sessionStorage.getItem('pitch-unlocked') === '1') gate.classList.add('hidden');
    document.getElementById('pw-submit').addEventListener('click', unlock);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

    // Slides
    const slides = document.querySelectorAll('.slide');
    const total = slides.length;
    let cur = 0;

    function goTo(n) {
      slides[cur].classList.remove('active');
      cur = n;
      slides[cur].classList.add('active');
      document.getElementById('counter').textContent = `${cur + 1} / ${total}`;
      document.getElementById('prev').disabled = cur === 0;
      document.getElementById('next').disabled = cur === total - 1;
    }

    document.getElementById('prev').addEventListener('click', () => goTo(cur - 1));
    document.getElementById('next').addEventListener('click', () => goTo(cur + 1));

    document.addEventListener('keydown', e => {
      if (!gate.classList.contains('hidden')) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (cur < total - 1) goTo(cur + 1); }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (cur > 0) goTo(cur - 1); }
      showNav();
    });

    // Auto-hide nav after 3s of inactivity
    const nav = document.querySelector('.nav');
    let hideTimer;

    function showNav() {
      nav.classList.remove('hidden');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => nav.classList.add('hidden'), 3000);
    }

    document.addEventListener('mousemove', showNav);
    document.addEventListener('touchstart', showNav);
    showNav();
  </script>
</body>
</html>
