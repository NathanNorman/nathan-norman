<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B2B Invoice Intelligence — Pitch Deck</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d5c63;
      font-family: 'DM Sans', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Password gate ── */
    #gate {
      position: fixed;
      inset: 0;
      background: #0d5c63;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #gate.hidden { display: none; }

    .gate-box {
      background: #fffffa;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 360px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
    }

    .gate-box h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #0d5c63;
      margin-bottom: 0.35rem;
      letter-spacing: -0.01em;
    }

    .gate-box p {
      font-size: 0.85rem;
      color: #44a1a0;
      margin-bottom: 2rem;
    }

    .gate-box input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #78cdd7;
      border-radius: 8px;
      font-size: 1rem;
      color: #0d5c63;
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
      background: #fffffa;
      transition: border-color 0.2s;
    }

    .gate-box input:focus { border-color: #44a1a0; }

    .gate-box input.error { border-color: #e05c5c; animation: shake 0.3s; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .gate-box button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem;
      background: #0d5c63;
      color: #fffffa;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .gate-box button:hover { background: #247b7b; }

    .gate-hint {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #e05c5c;
      min-height: 1rem;
    }

    /* ── Slides ── */
    #deck {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .slide.active { display: flex; }

    /* Slide 1 */
    #slide-1 {
      background: #0d5c63;
      flex-direction: column;
    }

    #slide-1 h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: #fffffa;
      text-align: center;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* Nav */
    .nav {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1rem;
      align-items: center;
      z-index: 10;
    }

    .nav button {
      background: rgba(255,255,250,0.15);
      border: 1px solid rgba(255,255,250,0.3);
      color: #fffffa;
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .nav button:hover { background: rgba(255,255,250,0.25); }
    .nav button:disabled { opacity: 0.3; cursor: default; }

    .nav .counter {
      color: rgba(255,255,250,0.6);
      font-size: 0.8rem;
      min-width: 3rem;
      text-align: center;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Password Gate -->
  <div id="gate">
    <div class="gate-box">
      <h1>B2B Invoice Intelligence</h1>
      <p>This presentation is password protected.</p>
      <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off">
      <div class="gate-hint" id="pw-hint"></div>
      <button id="pw-submit">Enter</button>
    </div>
  </div>

  <!-- Deck -->
  <div id="deck">
    <div class="slide active" id="slide-1">
      <h1>Slide 1</h1>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav">
    <button id="prev" disabled>← Prev</button>
    <span class="counter" id="counter">1 / 1</span>
    <button id="next" disabled>Next →</button>
  </div>

  <script>
    // ── Password gate ──
    const PASS = 'tcPUAJhv3xNkQorGtFiZSm3P';
    const gate = document.getElementById('gate');
    const input = document.getElementById('pw-input');
    const hint = document.getElementById('pw-hint');
    const submitBtn = document.getElementById('pw-submit');

    function unlock() {
      if (input.value === PASS) {
        sessionStorage.setItem('pitch-unlocked', '1');
        gate.classList.add('hidden');
      } else {
        input.classList.add('error');
        hint.textContent = 'Incorrect password.';
        input.value = '';
        setTimeout(() => input.classList.remove('error'), 400);
      }
    }

    if (sessionStorage.getItem('pitch-unlocked') === '1') {
      gate.classList.add('hidden');
    }

    submitBtn.addEventListener('click', unlock);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

    // ── Slide navigation ──
    const slides = document.querySelectorAll('.slide');
    let current = 0;

    function goTo(n) {
      slides[current].classList.remove('active');
      current = n;
      slides[current].classList.add('active');
      document.getElementById('counter').textContent = `${current + 1} / ${slides.length}`;
      document.getElementById('prev').disabled = current === 0;
      document.getElementById('next').disabled = current === slides.length - 1;
    }

    document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('next').addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', e => {
      if (gate.classList.contains('hidden')) {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (current < slides.length - 1) goTo(current + 1); }
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (current > 0) goTo(current - 1); }
      }
    });

    goTo(0);
  </script>
</body>
</html>
